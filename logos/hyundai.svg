<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="120" height="60">
  <rect width="120" height="60" fill="#002C5F"/>
  <!-- Gradiente decorativo -->
  <rect x="80" y="0" width="40" height="60" fill="rgba(0,80,160,0.3)"/>
  <!-- H elíptica estilizada (símbolo Hyundai simplificado) -->
  <ellipse cx="25" cy="30" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <text x="25" y="35" font-family="Arial Black, sans-serif" font-size="18" font-weight="900"
    fill="rgba(255,255,255,0.35)" text-anchor="middle" font-style="italic">H</text>
  <!-- Texto HYUNDAI -->
  <text x="72" y="33" font-family="Arial Black, sans-serif" font-size="13" font-weight="900"
    fill="#fff" text-anchor="middle" letter-spacing="1.5">HYUNDAI</text>
  <rect x="40" y="38" width="64" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
  <text x="72" y="50" font-family="Arial, sans-serif" font-size="7.5" font-weight="600"
    fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">HEAVY INDUSTRY</text>
</svg>
