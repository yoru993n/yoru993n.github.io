  <polygon points="0,0 50,0 0,60" fill="rgba(255,255,255,0.06)"/>
  <!-- Círculo con K -->
  <circle cx="22" cy="30" r="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
