<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="120" height="60">
  <!-- Fondo con gradiente diagonal -->
  <rect width="120" height="60" fill="#003087"/>
  <polygon points="0,0 60,0 40,60 0,60" fill="rgba(255,255,255,0.05)"/>
  <!-- Parches de color Kawasaki verde -->
  <polygon points="0,45 20,60 0,60" fill="#5CB85C" opacity="0.5"/>
  <!-- K estilizada -->
  <text x="20" y="42" font-family="Arial Black, sans-serif" font-size="32" font-weight="900"
    fill="rgba(255,255,255,0.2)" font-style="italic">K</text>
  <!-- KAWASAKI -->
  <text x="72" y="31" font-family="Arial Black, sans-serif" font-size="11" font-weight="900"
    fill="#fff" text-anchor="middle" letter-spacing="0.8">KAWASAKI</text>
  <rect x="42" y="36" width="60" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
  <text x="72" y="48" font-family="Arial, sans-serif" font-size="7" font-weight="600"
    fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">HYDRAULICS</text>
</svg>
